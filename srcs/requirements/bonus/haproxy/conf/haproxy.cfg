global
    # Sends logs to the container's standard output (visible via 'docker logs').
    # Essential for debugging API requests filtered by HAProxy.
    log stdout format raw local0

defaults
    # HAProxy will operate at Layer 7 (HTTP) to allow path-based filtering and deep inspection.
    mode http
    
    # Standard timeout configurations for connection, client, and server response.
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    
    # Inherit logging configuration from the global section.
    log global
    
    # Generates rich logs for HTTP requests, including paths, status codes, and timings.
    option httplog

frontend docker-api
    # Listens on all interfaces on port 2375 (default Docker TCP port).
    bind *:2375
    
    # -------------------------------------------------------------------------
    # 1. ACLs: Granular Role-Based Access Control (RBAC) for the Docker API
    # -------------------------------------------------------------------------
    
    # Safe Read-Only Endpoints:
    # Allows safe, non-destructive data retrieval. Limits image and container queries 
    # specifically to the JSON list endpoints to prevent deep inspections that might 
    # trigger unwanted external registry lookups (preventing 403 Forbidden errors).
    acl is_read_only path_reg ^/(v[0-9.]+/)?(version|info|_ping|events|images/json|containers/json|networks|volumes)$
    
    # Container Lifecycle Actions:
    # Grants Arcane the ability to control container states (start, stop, restart).
    # Crucially, it omits the DELETE method/path, preventing Arcane from destroying containers.
    # The regex [a-zA-Z0-9_.:-]+ robustly handles both hex IDs and complex container names.
    acl is_container_action path_reg ^/(v[0-9.]+/)?containers/[a-zA-Z0-9_.:-]+/(start|stop|restart|kill|attach|wait)$

    # Container Execution (Exec):
    # Permits creating and starting exec instances to run commands inside running containers.
    # Required for Arcane's interactive features.
    acl is_exec path_reg ^/(v[0-9.]+/)?(containers/[a-zA-Z0-9_.:-]+/exec|exec/[a-zA-Z0-9_.:-]+/(start|json))$

    # Highly Sensitive Endpoints:
    # Identifies paths that manage the Docker daemon itself, swarm clusters, or image building.
    acl forbidden_paths path_reg ^/(v[0-9.]+/)?(build|swarm|system|nodes|services|tasks|plugins|configs|secrets|auth|commit)$

    # -------------------------------------------------------------------------
    # 2. Security Rules: Applying the Zero Trust approach
    # -------------------------------------------------------------------------
    
    # Rule A: Immediately drop any request targeting highly sensitive endpoints.
    http-request deny if forbidden_paths
    
    # Rule B: Accept requests that match our strictly defined operational needs.
    http-request allow if is_read_only
    http-request allow if is_container_action
    http-request allow if is_exec
    
    # Rule C: Default security stance - if it's not explicitly allowed above, block it.
    # This prevents new or unknown Docker API features from being exploited.
    http-request deny 

    # Route all authorized and sanitized traffic to the backend.
    default_backend docker-socket

backend docker-socket
    # Forward the traffic to the host's Docker socket mounted in the container.
    # CRITICAL: The 'unix@' prefix is mandatory here so HAProxy knows to communicate 
    # via an Inter-Process Communication (IPC) socket rather than trying to resolve an IP.
    # The 'check' keyword allows HAProxy to actively monitor the health of the Docker engine.
    server docker unix@/var/run/docker.sock check
