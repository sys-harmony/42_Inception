name: inception

# YAML Anchor to standardize logging across all services
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  mariadb:
    build:
      context: ./requirements/mariadb
    image: mariadb:inception-v1
    container_name: mariadb
    restart: unless-stopped
    healthcheck:
      # We use the root secret directly since MYSQL_PASSWORD environment variable isn't set
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$(cat /run/secrets/db_root_password) --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_HOSTNAME=${MYSQL_HOSTNAME}
    secrets:
      - db_password
      - db_root_password
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
    logging: *default-logging

  wordpress:
    build:
      context: ./requirements/wordpress
    image: wordpress:inception-v1
    container_name: wordpress
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # pgrep is more flexible regarding the exact php-fpm binary name
      test: ["CMD-SHELL", "pgrep php-fpm > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s # Gives wp-cli enough time to download and install everything during the first boot
    env_file: .env
    secrets:
      - db_password
      - redis_password
      - wp_admin_password
      - wp_user_password
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception
    logging: *default-logging

  redis:
    build:
      context: ./requirements/bonus/redis
    image: redis:inception-v1
    container_name: redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h 127.0.0.1 -a \"$$(cat /run/secrets/redis_password)\" ping | grep PONG || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    secrets:
      - redis_password
    networks:
      - inception
    logging: *default-logging

  nginx:
    build:
      context: ./requirements/nginx
    image: nginx:inception-v1
    container_name: nginx
    restart: unless-stopped
    depends_on:
      wordpress:
        condition: service_healthy
    healthcheck:
      # Verifies the web server is actually serving the page over HTTPS
      test: ["CMD-SHELL", "wget --no-check-certificate --spider https://localhost || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s # Safety buffer for SSL generation and config loading
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
    volumes:
      - wordpress_data:/var/www/html:ro
    networks:
      - inception
    ports:
      - "443:443" # Only HTTPS port is exposed to the host
    logging: *default-logging

  ftp:
    build:
      context: ./requirements/bonus/ftp
    image: ftp:inception-v1
    container_name: ftp
    restart: unless-stopped
    environment:
      - FTP_USER=${FTP_USER}
    secrets:
      - ftp_password
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception
    ports:
      - "21:21"
      - "40000-40005:40000-40005" # Passive mode port range
    logging: *default-logging

  static:
    build:
      context: ./requirements/bonus/static
    image: static:inception-v1
    container_name: static
    restart: unless-stopped
    networks:
      - inception
    ports:
      - "8081:80"
    logging: *default-logging

  adminer:
    build:
      context: ./requirements/bonus/adminer
    image: adminer:inception-v1
    container_name: adminer
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - inception
    ports:
      - "8080:8080"
    logging: *default-logging

  arcane:
    build:
      context: ./requirements/bonus/arcane
    image: arcane:inception-v1
    container_name: arcane
    restart: unless-stopped
    secrets:
      - arc_encryption_key
      - arc_jwt_secret
    volumes:
      # Allows Arcane to interact with the host Docker daemon
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - arcane_data:/app/data
    networks:
      - inception
    ports:
      - "3552:3552"
    logging: *default-logging

# Docker Secrets: Files are mounted as temporary files inside /run/secrets/ in containers
secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt
  redis_password:
    file: ../secrets/redis_password.txt
  ftp_password:
    file: ../secrets/ftp_password.txt
  arc_encryption_key:
    file: ../secrets/arc_encryption_key.txt
  arc_jwt_secret:
    file: ../secrets/arc_jwt_secret.txt

networks:
  inception:
    driver: bridge # Standard bridge network for inter-container communication (default mode)

# Named volumes configured as bind-mounts to specific host paths
volumes:
  mariadb_data:
    driver_opts:
      type: none
      o: bind
      device: /home/gdosch/data/mariadb
  wordpress_data:
    driver_opts:
      type: none
      o: bind
      device: /home/gdosch/data/wordpress
  arcane_data:
    driver_opts:
      type: none
      o: bind
      device: /home/gdosch/data/arcane
