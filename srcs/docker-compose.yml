name: inception

services:
  mariadb:
    build: ./requirements/mariadb
    image: mariadb
    container_name: mariadb
    restart: always
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_HOSTNAME=${MYSQL_HOSTNAME}
    secrets:
      - db_password
      - db_root_password
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception

  wordpress:
    build: ./requirements/wordpress
    image: wordpress
    container_name: wordpress
    restart: always
    depends_on:
      - mariadb
    env_file: .env
    secrets:
      - db_password
      - redis_password
      - wp_admin_password
      - wp_user_password
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception

  redis:
    build: ./requirements/bonus/redis
    image: redis
    container_name: redis
    restart: always
    secrets:
      - redis_password
    networks:
      - inception

  nginx:
    build: ./requirements/nginx
    image: nginx
    container_name: nginx
    restart: always
    depends_on:
      - wordpress
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception
    ports:
      - "443:443"

  ftp:
    build: ./requirements/bonus/ftp
    image: ftp
    container_name: ftp
    restart: always
    environment:
      - FTP_USER=${FTP_USER}
    secrets:
      - ftp_password
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception
    ports:
      - "21:21"
      - "40000-40005:40000-40005"

  static:
    build: ./requirements/bonus/static
    image: static
    container_name: static
    restart: always
    networks:
      - inception
    ports:
      - "8081:80"

  adminer:
    build: ./requirements/bonus/adminer
    image: adminer
    container_name: adminer
    restart: always
    depends_on:
      - mariadb
    networks:
      - inception
    ports:
      - "8080:8080"

  arcane:
    build: ./requirements/bonus/arcane
    image: arcane
    container_name: arcane
    restart: always
    secrets:
      - arc_encryption_key
      - arc_jwt_secret
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - arcane_data:/app/data
    networks:
      - inception
    ports:
      - "3552:3552"

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt
  redis_password:
    file: ../secrets/redis_password.txt
  ftp_password:
    file: ../secrets/ftp_password.txt
  arc_encryption_key:
    file: ../secrets/arc_encryption_key.txt
  arc_jwt_secret:
    file: ../secrets/arc_jwt_secret.txt

networks:
  inception:
    driver: bridge

volumes:
  mariadb_data:
    driver_opts:
      type: none
      o: bind
      device: /home/gdosch/data/mariadb
  wordpress_data:
    driver_opts:
      type: none
      o: bind
      device: /home/gdosch/data/wordpress
  arcane_data:
    driver_opts:
      type: none
      o: bind
      device: /home/gdosch/data/arcane
